name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        cd server && npm ci
        cd ../client && npm ci
    
    - name: Run tests
      run: |
        cd server && npm test
        cd ../client && npm test
    
    - name: Build application
      run: |
        cd client && npm run build
        cd ../server && npm run build
    
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /var/www/ifysora
          git pull origin main
          docker-compose down
          docker-compose build --no-cache
          docker-compose up -d
          docker system prune -f
    
    - name: Run database migrations
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          docker exec ifysora_app_1 npx prisma db push
          docker exec ifysora_app_1 npx prisma generate

          name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        cd server && npm ci
        cd ../client && npm ci
    
    - name: Run tests
      run: |
        cd server && npm test
        cd ../client && npm test

    # NEW: Security audit
    - name: Security audit
      run: |
        cd server && npm audit
        cd ../client && npm audit

    # NEW: Build
    - name: Build application
      run: |
        cd client && npm run build
        cd ../server && npm run build

    # NEW: Run migrations locally before deploy (optional)
    - name: Run database migrations
      run: |
        cd server && npx prisma db push

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /var/www/ifysora
          git pull origin main
          docker-compose down
          docker-compose build --no-cache
          docker-compose up -d
          docker system prune -f

    # NEW: Health check
    - name: Health check
      run: |
        sleep 30
        curl -f https://api.ifysora.com/health || exit 1

    # NEW: Slack notification
    - name: Notify Slack
      if: always()
      run: |
        curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          -H 'Content-type: application/json' \
          -d '{
            "text": "${{ job.status == 'success' && '✅' || '❌' }} Deployment ${{ job.status }}!",
            "attachments": [
              {
                "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {"title": "Version", "value": "${{ github.sha }}", "short": true},
                  {"title": "Environment", "value": "Production", "short": true}
                ]
              }
            ]
          }'
